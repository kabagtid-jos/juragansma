<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Si Juragan - Jurnal Guru</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#f3f4f6;
}
.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>

</head>
<body class="p-6">

<div class="max-w-md mx-auto card">

<div class="text-center mb-6">
<h1 class="text-2xl font-bold text-amber-600">Si Juragan</h1>
<p class="text-sm text-gray-500">Sistem Jurnal Guru</p>
</div>

<div class="mb-4">
<label class="text-sm">NIY</label>
<input id="niy" class="w-full border rounded-lg p-3 mt-1" placeholder="Masukkan NIY">
</div>

<button onclick="login()" class="w-full bg-amber-500 text-white py-3 rounded-lg font-semibold">
Login
</button>

<div id="result" class="mt-6 text-sm text-gray-600"></div>

</div>


<script>

/*
========================================
CONFIG
========================================
GANTI URL INI DENGAN WEB APP GOOGLE SCRIPT
*/
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJTtJ6sXH4mKhvZ2lrGCGKOPlFmgrEKnhbpZk-jjAA7U-qj7--0s6ocAZS9MBUWWXvvA/exec";



/*
========================================
SHIM google.script.run
agar bisa jalan di hosting biasa
========================================
*/

window.google = {};
google.script = {};

google.script.run = new Proxy({},{
get:(target,method)=>{

return (...args)=>{

let successHandler = null;
let failureHandler = null;

const runner = {

withSuccessHandler(fn){
successHandler = fn;
return runner;
},

withFailureHandler(fn){
failureHandler = fn;
return runner;
},

execute(){

fetch(WEB_APP_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
method:method,
args:args
})
})
.then(res=>res.json())
.then(data=>{
if(successHandler) successHandler(data);
})
.catch(err=>{
if(failureHandler) failureHandler(err);
});

}

};

setTimeout(()=>runner.execute(),0);

return runner;

}

}
});


/*
========================================
LOGIN FUNCTION
========================================
*/

function login(){

const niy = document.getElementById("niy").value;

document.getElementById("result").innerHTML="Memproses...";

google.script.run
.withSuccessHandler(function(res){

if(res.success){

document.getElementById("result").innerHTML=
`<b>Login berhasil</b><br>
Nama : ${res.name}<br>
Role : ${res.role}`;

}else{

document.getElementById("result").innerHTML=
`<span style="color:red">${res.message}</span>`;

}

})
.withFailureHandler(function(){

document.getElementById("result").innerHTML=
"<span style='color:red'>Koneksi gagal</span>";

})
.login(niy);

}

</script>

</body>
</html>
